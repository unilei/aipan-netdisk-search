name: Deploy

on:
  push:
    branches:
      - feat-add-admin-panel

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Debug SSH Connection
        run: |
          echo "Testing SSH connection..."
          # 创建 SSH 配置目录
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # 添加服务器到已知主机
          echo "${{ secrets.SERVER_HOST }} $(ssh-keyscan -t rsa ${{ secrets.SERVER_HOST }} 2>/dev/null)" >> ~/.ssh/known_hosts

          # 测试连接
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=no -p 22 ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "echo 'SSH connection successful'"

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npm run build
        env:
          # Database configuration
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SHADOW_DATABASE_URL: ${{ secrets.SHADOW_DATABASE_URL }}
          DATABASE_SCHEMA: ${{ secrets.DATABASE_SCHEMA }}

          # GitHub configuration
          NUXT_PUBLIC_GITHUB_OWNER: ${{ secrets.NUXT_PUBLIC_GITHUB_OWNER }}
          NUXT_PUBLIC_GITHUB_ADMIN_TOKEN: ${{ secrets.NUXT_PUBLIC_GITHUB_ADMIN_TOKEN }}
          NUXT_PUBLIC_GITHUB_REPO: ${{ secrets.NUXT_PUBLIC_GITHUB_REPO }}

          # Admin configuration
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Install pigz
        run: sudo apt-get update && sudo apt-get install -y pigz

      - name: Create deployment package
        run: |
          RELEASE_NAME="release-$(date +%Y%m%d%H%M%S)"
          echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
          echo "Creating deployment archive..."
          tar cf - .output prisma package.json package-lock.json | pigz -9 -p 4 > "${RELEASE_NAME}.tar.gz"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_NAME }}
          release_name: Release ${{ env.RELEASE_NAME }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ env.RELEASE_NAME }}.tar.gz
          asset_name: ${{ env.RELEASE_NAME }}.tar.gz
          asset_content_type: application/gzip

      - name: Deploy to server
        run: |
          # Setup SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Deploy using GitHub release
          echo "Deploying to server..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} bash -s << EOL
            cd /www/wwwroot/aipan-netdisk
            
            # Backup current node_modules if exists
            if [ -d "node_modules" ]; then
              mv node_modules node_modules_backup
            fi
            
            # Download from GitHub release using CDN
            echo "Downloading release..."
            curl -L -o deploy.tar.gz https://github.com/${{ github.repository }}/releases/download/${RELEASE_NAME}/${RELEASE_NAME}.tar.gz
            
            # Extract files
            echo "Extracting files..."
            tar xzf deploy.tar.gz
            rm deploy.tar.gz
            
            # Install production dependencies
            echo "Installing production dependencies..."
            npm install --production --prefer-offline --no-audit
            
            # Cleanup
            if [ -d "node_modules_backup" ]; then
              rm -rf node_modules_backup
            fi
          EOL

      - name: Execute remote commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          debug: true
          script: |
            cd /www/wwwroot/aipan-netdisk

            echo "Creating .env file..."
            cat > .env << EOL
            DATABASE_URL="${{ secrets.DATABASE_URL }}"
            SHADOW_DATABASE_URL="${{ secrets.SHADOW_DATABASE_URL }}"
            DATABASE_SCHEMA="${{ secrets.DATABASE_SCHEMA }}"
            NUXT_PUBLIC_GITHUB_OWNER="${{ secrets.NUXT_PUBLIC_GITHUB_OWNER }}"
            NUXT_PUBLIC_GITHUB_ADMIN_TOKEN="${{ secrets.NUXT_PUBLIC_GITHUB_ADMIN_TOKEN }}"
            NUXT_PUBLIC_GITHUB_REPO="${{ secrets.NUXT_PUBLIC_GITHUB_REPO }}"
            ADMIN_USER="${{ secrets.ADMIN_USER }}"
            ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}"
            ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            EOL

            echo "Installing Prisma..."
            npm install prisma

            echo "Generating Prisma Client..."
            npx prisma generate

            echo "Running database migrations..."
            npx prisma migrate deploy

            echo "Starting application..."
            if pm2 list | grep -q "aipan-netdisk"; then
              echo "Reloading existing PM2 process..."
              pm2 reload aipan-netdisk
            else
              echo "Starting new PM2 process..."
              pm2 start server/index.mjs --name "aipan-netdisk" --env production
            fi

version: '3.8'

services:
  # 数据库迁移服务
  prisma-migrate:
    image: unilei/aipan-netdisk-search:latest
    container_name: aipan-prisma-migrate
    restart: "no"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=${DATABASE_SCHEMA}
      - SHADOW_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}_shadow?schema=${DATABASE_SCHEMA}
      # 确保 Prisma 使用正确的数据库用户名
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    command: ["/bin/sh", "-c", "cd /app && if [ ! -f ./prisma-esm-fix.mjs ]; then echo 'Creating prisma-esm-fix.mjs file...' && echo \"import { fileURLToPath } from 'url'; import { dirname } from 'path'; import { createRequire } from 'module'; if (typeof global.__filename === 'undefined') { global.__filename = fileURLToPath(import.meta.url); } if (typeof global.__dirname === 'undefined') { global.__dirname = dirname(global.__filename); } if (typeof global.require === 'undefined') { global.require = createRequire(import.meta.url); } console.log('[Prisma ESM Fix] 已加载 ES Module 环境修复');\" > ./prisma-esm-fix.mjs; fi && node --import=./prisma-esm-fix.mjs -e \"console.log('Running Prisma migrations with ESM fix')\" && npx prisma migrate deploy && npx prisma db seed"]
    depends_on:
      - postgres
    networks:
      - aipan-network

  # 主应用服务
  aipan-netdisk-search:
    image: unilei/aipan-netdisk-search:latest
    container_name: aipan-netdisk-search-app
    restart: always
    ports:
      - "${APP_PORT}:3000"  # Web应用端口
      - "${WS_PORT}:3002"  # WebSocket端口
    environment:
      # 数据库配置
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=${DATABASE_SCHEMA}
      - NUXT_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=${DATABASE_SCHEMA}
      - DATABASE_SCHEMA=${DATABASE_SCHEMA}
      - NUXT_DATABASE_SCHEMA=${DATABASE_SCHEMA}
      - SHADOW_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}_shadow?schema=${DATABASE_SCHEMA}
      # 数据库连接信息
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      # 数据库备份 / R2
      - DB_BACKUP_RETENTION=${DB_BACKUP_RETENTION:-10}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET=${R2_BUCKET:-}
      - R2_PREFIX=${R2_PREFIX:-aipan/postgres}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      
      # 管理员配置
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      # Nuxt 版本的管理员配置（用于 useRuntimeConfig 访问）
      - NUXT_ADMIN_USER=${ADMIN_USER}
      - NUXT_ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - NUXT_ADMIN_EMAIL=${ADMIN_EMAIL}
      
      # 安全配置
      - JWT_SECRET=${JWT_SECRET}
      - NUXT_JWT_SECRET=${JWT_SECRET}
      
      # GitHub配置
      - NUXT_PUBLIC_GITHUB_OWNER=${NUXT_PUBLIC_GITHUB_OWNER}
      - NUXT_PUBLIC_GITHUB_REPO=${NUXT_PUBLIC_GITHUB_REPO}
      - NUXT_PUBLIC_GITHUB_TOKEN=${NUXT_PUBLIC_GITHUB_TOKEN}
      - NUXT_PUBLIC_GITHUB_BRANCH=${NUXT_PUBLIC_GITHUB_BRANCH}
      
      # Quark配置
      - NUXT_PUBLIC_QUARK_COOKIE=${NUXT_PUBLIC_QUARK_COOKIE}
      
      # WebSocket配置
      - WS_PORT=${WS_PORT}
      
      # Redis配置
      - REDIS_URL=${REDIS_URL}

      # PanSou source配置
      - PANSOU_API_URLS=${PANSOU_API_URLS:?PANSOU_API_URLS is required}
      - NUXT_PANSOU_API_URLS=${PANSOU_API_URLS:?PANSOU_API_URLS is required}
      - PANSOU_AUTH_TOKEN=${PANSOU_AUTH_TOKEN:-}
      - NUXT_PANSOU_AUTH_TOKEN=${PANSOU_AUTH_TOKEN:-}
      - PANSOU_CLOUD_TYPES=${PANSOU_CLOUD_TYPES:-baidu,aliyun,quark,guangya,tianyi,uc,mobile,115,pikpak,xunlei,123,magnet,ed2k}
      - NUXT_PANSOU_CLOUD_TYPES=${PANSOU_CLOUD_TYPES:-baidu,aliyun,quark,guangya,tianyi,uc,mobile,115,pikpak,xunlei,123,magnet,ed2k}
      - PANSOU_PLUGINS=${PANSOU_PLUGINS:-}
      - NUXT_PANSOU_PLUGINS=${PANSOU_PLUGINS:-}
      - PANSOU_CHANNELS=${PANSOU_CHANNELS:-}
      - NUXT_PANSOU_CHANNELS=${PANSOU_CHANNELS:-}
      - PANSOU_RESULT_MODE=${PANSOU_RESULT_MODE:-merge}
      - NUXT_PANSOU_RESULT_MODE=${PANSOU_RESULT_MODE:-merge}
      - PANSOU_SOURCE_MODE=${PANSOU_SOURCE_MODE:-all}
      - NUXT_PANSOU_SOURCE_MODE=${PANSOU_SOURCE_MODE:-all}
      - PANSOU_REFRESH=${PANSOU_REFRESH:-false}
      - NUXT_PANSOU_REFRESH=${PANSOU_REFRESH:-false}
      - PANSOU_REQUEST_TIMEOUT_MS=${PANSOU_REQUEST_TIMEOUT_MS:-15000}
      - NUXT_PANSOU_REQUEST_TIMEOUT_MS=${PANSOU_REQUEST_TIMEOUT_MS:-15000}
      - PANSOU_MAX_RESULTS=${PANSOU_MAX_RESULTS:-120}
      - NUXT_PANSOU_MAX_RESULTS=${PANSOU_MAX_RESULTS:-120}
      
      # 环境配置
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis
      - prisma-migrate
    networks:
      - aipan-network

  postgres-backup:
    image: ${DB_BACKUP_IMAGE:-unilei/aipan-netdisk-search:db-backup-latest}
    container_name: aipan-postgres-backup
    restart: unless-stopped
    environment:
      - DB_BACKUP_ENABLED=${DB_BACKUP_ENABLED:-true}
      - DB_BACKUP_TIME=${DB_BACKUP_TIME:-03:00}
      - DB_BACKUP_RETENTION=${DB_BACKUP_RETENTION:-10}
      - DB_BACKUP_RUN_ON_STARTUP=${DB_BACKUP_RUN_ON_STARTUP:-false}
      - TZ=${TZ:-Asia/Shanghai}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET=${R2_BUCKET:-}
      - R2_PREFIX=${R2_PREFIX:-aipan/postgres}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
    depends_on:
      - postgres
    networks:
      - aipan-network

  postgres:
    image: postgres:15-alpine
    container_name: aipan-postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - aipan-network

  redis:
    image: redis:alpine
    container_name: aipan-redis
    restart: always
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    networks:
      - aipan-network

volumes:
  postgres-data:
  redis-data:

networks:
  aipan-network:
    driver: bridge
